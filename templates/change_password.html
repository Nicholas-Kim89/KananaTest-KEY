{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.05);">
    <h2 style="margin-bottom: 24px; font-size: 1.5rem;"><i class="fa-solid fa-unlock-keyhole"></i> 비밀번호 변경</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
            <div style="padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.95rem; {% if '성공' in message %}background-color: #e6f7eb; color: #198038; border: 1px solid #bceac9;{% else %}background-color: #ffe5e5; color: #da1e28; border: 1px solid #ffb3b3;{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('change_password') }}" method="POST">
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">현재 비밀번호</label>
            <input type="password" name="current_password" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">새 비밀번호</label>
            <input type="password" name="new_password" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        
        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">새 비밀번호 확인</label>
            <input type="password" name="confirm_password" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
        </div>
        
        <div style="display: flex; gap: 12px;">
            <a href="/" style="flex: 1; text-align: center; padding: 12px; background: #f4f4f4; color: #333; text-decoration: none; border-radius: 6px; font-weight: 500;">취소</a>
            <button type="submit" style="flex: 1; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">비밀번호 변경</button>
        </div>
    </form>
</div>
{% endblock %}
